<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="دليل قطع غيار كويك أوتو - ابحث عن قطع الغيار والملحقات المتوفرة بمركز QUICK AUTO الفني" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0d1426" />
    <title>QUICK AUTO | دليل قطع الغيار والملحقات</title>
    <script>
      (function() {
        // Detect if running inside Capacitor native app wrapper
        var isNative = window.location.hostname === 'localhost' || 
                       window.location.hostname === '127.0.0.1' ||
                       window.location.protocol === 'file:' || 
                       window.location.protocol === 'capacitor:' ||
                       window.location.protocol === 'iosapp:';

        if (isNative) {
          // Unregister service workers and clear caches in native app to force updates
          try {
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                var unregistered = false;
                for (var i = 0; i < registrations.length; i++) {
                  registrations[i].unregister();
                  unregistered = true;
                }
                if (unregistered && window.caches) {
                  caches.keys().then(function(keys) {
                    keys.forEach(function(key) {
                      caches.delete(key);
                    });
                  });
                  setTimeout(function() {
                    window.location.reload(true);
                  }, 300);
                }
              });
            }
          } catch (swErr) {}
        } else {
          // Register service worker in browser for PWA installability
          try {
            if ('serviceWorker' in navigator) {
              window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').then(function(reg) {
                  console.log('PWA ServiceWorker registered');
                }).catch(function(err) {
                  console.error('PWA ServiceWorker registration failed:', err);
                });
              });
            }
          } catch (swErr) {}
        }

        function cleanup() {
          var selectors = [
            '#eruda', '.eruda-entry-btn', '.eruda-container', 'eruda',
            '[id*="eruda"]', '[class*="eruda"]', '.vc-switch', '#__vconsole',
            '#vConsole', '.vconsole-container'
          ];
          selectors.forEach(function(sel) {
            try {
              var els = document.querySelectorAll(sel);
              for (var i = 0; i < els.length; i++) {
                var p = els[i].parentNode;
                if (p) p.removeChild(els[i]);
              }
            } catch (e) {}
          });

          var all = document.getElementsByTagName('*');
          for (var j = 0; j < all.length; j++) {
            var el = all[j];
            if (el.shadowRoot) {
              var entry = el.shadowRoot.querySelector('.eruda-entry-btn');
              if (entry) {
                var p = el.parentNode;
                if (p) p.removeChild(el);
              }
            }
          }
        }
        try {
          cleanup();
          var observer = new MutationObserver(function() { cleanup(); });
          observer.observe(document.documentElement, { childList: true, subtree: true });
          window.addEventListener('load', cleanup);
          document.addEventListener('DOMContentLoaded', cleanup);
        } catch (err) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
